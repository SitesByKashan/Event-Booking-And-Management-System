<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Settings - EventHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }</style>
</head>
<body class="text-[#1E293B] antialiased">

    <div id="navbar"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl font-black mb-8">Profile & Settings</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            <aside class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <div class="w-20 h-20 bg-indigo-100 rounded-full mx-auto flex items-center justify-center text-indigo-600 font-bold text-2xl mb-4">JD</div>
                    <h2 class="font-bold">John Doe</h2>
                    <p class="text-xs text-gray-400">john.doe@example.com</p>
                </div>
                <nav class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-2">
                    <a href="#" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-50 text-indigo-600 font-bold text-sm"><i class="fa-solid fa-user w-4"></i> Profile</a>
                    <a href="/user/notifications.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-600 hover:bg-gray-50 font-semibold text-sm"><i class="fa-solid fa-bell w-4"></i> Notifications</a>
                    
                </nav>
            </aside>

            <div class="md:col-span-3 space-y-8">
                <section class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
                    <h3 class="font-bold text-lg mb-6">Personal Information</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-2">First Name</label><input type="text" value="John" class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold"></div>
                        <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Last Name</label><input type="text" value="Doe" class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold"></div>
                        <div class="sm:col-span-2"><label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Email Address</label><input type="email" value="john.doe@example.com" class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold"></div>
                    </div>
                    <button class="mt-6 bg-[#5C7CFA] text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#4C6EF5]">Save Changes</button>
                </section>

                <section class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
                    <h3 class="font-bold text-lg mb-6">Change Password</h3>
                    <div class="space-y-4">
                        <input type="password" placeholder="Current Password" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                        <input type="password" placeholder="New Password" class="w-full bg-slate-50 border rounded-xl p-3 text-sm">
                    </div>
                    <button class="mt-6 bg-[#5C7CFA] text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#4C6EF5]">Update Password</button>
                </section>
            </div>
        </div>
    </main>
     
     <div id="Footer"></div>
     
<script src="js/app.js"></script>
    <script>
         async function load(id, file) {
        try {
            const response = await fetch(file);
            if (!response.ok) throw new Error("File nahi mili");
            const data = await response.text();
            document.getElementById(id).innerHTML = data;
        } catch (error) {
            console.error("Hero Load Error:", error);
            // Agar ye error console mein aaye, toh file path check karein
        }
    }
        load("navbar", "Components/navbar.html");
        load("Footer", "Components/Footer.html");
    </script>

</body>
</html>

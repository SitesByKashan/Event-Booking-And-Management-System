<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Settings - EventHub</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
    }
  </style>
</head>

<body class="text-[#1E293B] antialiased">

<script>
const loggedUser = JSON.parse(localStorage.getItem("user"));

if (!loggedUser) {
  window.location.href = "login.html";
}
</script>

<div id="navbar"></div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-black mb-8">Profile & Settings</h1>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

    <aside class="space-y-6">
      <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
        <div
          id="profileInitials"
          class="w-20 h-20 bg-indigo-100 rounded-full mx-auto flex items-center justify-center text-indigo-600 font-bold text-2xl mb-4">
          US
        </div>

        <h2 id="sidebarName" class="font-bold">Loading...</h2>
        <p id="sidebarEmail" class="text-xs text-gray-400">Loading...</p>
      </div>

      <nav class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-2">
        <a href="profile-settings.html" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-50 text-indigo-600 font-bold text-sm">
          <i class="fa-solid fa-user w-4"></i> Profile
        </a>

        <!-- <a href="notifications.html" class="flex items-center gap-3 p-3 rounded-lg text-gray-600 hover:bg-gray-50 font-semibold text-sm">
          <i class="fa-solid fa-bell w-4"></i> Notifications
        </a> -->
      </nav>
    </aside>

    <div class="md:col-span-3 space-y-8">

      <section class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
        <h3 class="font-bold text-lg mb-6">Personal Information</h3>

        <form id="profileForm">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

            <div>
              <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">First Name</label>
              <input
                id="firstName"
                type="text"
                class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold">
            </div>

            <div>
              <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Last Name</label>
              <input
                id="lastName"
                type="text"
                class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold">
            </div>

            <div class="sm:col-span-2">
              <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Email Address</label>
              <input
                id="email"
                type="email"
                class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold">
            </div>

            <div class="sm:col-span-2">
              <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Phone</label>
              <input
                id="phone"
                type="text"
                placeholder="+92 300 0000000"
                class="w-full bg-slate-50 border rounded-xl p-3 text-sm font-semibold">
            </div>

          </div>

          <button
            type="submit"
            class="mt-6 bg-[#5C7CFA] text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#4C6EF5]">
            Save Changes
          </button>
        </form>
      </section>

      <section class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
        <h3 class="font-bold text-lg mb-6">Change Password</h3>

        <form id="passwordForm" class="space-y-4">
          <input
            id="currentPassword"
            type="password"
            placeholder="Current Password"
            class="w-full bg-slate-50 border rounded-xl p-3 text-sm">

          <input
            id="newPassword"
            type="password"
            placeholder="New Password"
            class="w-full bg-slate-50 border rounded-xl p-3 text-sm">

          <input
            id="confirmPassword"
            type="password"
            placeholder="Confirm New Password"
            class="w-full bg-slate-50 border rounded-xl p-3 text-sm">

          <button
            type="submit"
            class="mt-2 bg-[#5C7CFA] text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#4C6EF5]">
            Update Password
          </button>
        </form>
      </section>

    </div>
  </div>
</main>

<div id="Footer"></div>

<script src="js/app.js"></script>
<script src="../assets/js/user-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>
load("navbar", "Components/navbar.html");
load("Footer", "Components/Footer.html");

loadProfileData();
setupForms();

async function loadProfileData() {
  try {
    const response = await getProfile();

    if (!response.status) {
      showToast(response.message, "error");
      return;
    }

    const user = response.data;

    const fullName = user.name || "";
    const nameParts = fullName.split(" ");

    const firstName = nameParts[0] || "";
    const lastName = nameParts.slice(1).join(" ") || "";

    document.getElementById("firstName").value = firstName;
    document.getElementById("lastName").value = lastName;
    document.getElementById("email").value = user.email || "";
    document.getElementById("phone").value = user.phone || "";

    document.getElementById("sidebarName").innerText = user.name || "User";
    document.getElementById("sidebarEmail").innerText = user.email || "";

    const initials = (user.name || "User")
      .split(" ")
      .map(word => word[0])
      .join("")
      .substring(0, 2)
      .toUpperCase();

    document.getElementById("profileInitials").innerText = initials;

  } catch (error) {
    console.log("Profile Load Error:", error);
  }
}

function setupForms() {
  document.getElementById("profileForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();

    const data = {
      name: firstName + " " + lastName,
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim()
    };

    const response = await updateProfile(data);

    showToast(response.message);

    if (response.status) {
      const oldUser = JSON.parse(localStorage.getItem("user")) || {};

      oldUser.name = data.name;
      oldUser.email = data.email;

      localStorage.setItem("user", JSON.stringify(oldUser));

      loadProfileData();
      updateUserNavbar();
    }
  });

  document.getElementById("passwordForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
      showToast("New password and confirm password do not match", "error");
      return;
    }

    const response = await updatePassword({
      current_password: currentPassword,
      new_password: newPassword
    });

    showToast(response.message);

    if (response.status) {
      document.getElementById("passwordForm").reset();
    }
  });
}
</script>

</body>
</html>

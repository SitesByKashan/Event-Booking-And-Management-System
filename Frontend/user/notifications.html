<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | EventHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <script>
        const loggedUser = JSON.parse(localStorage.getItem("user"));

        if (!loggedUser) {
            window.location.href = "login.html";
        }
    </script>

    <div id="navbar"></div>

    <main class="flex-grow max-w-5xl mx-auto w-full py-10 px-6">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-[#0F172A] flex items-center gap-3">
                    <i class="fa-regular fa-bell text-blue-600"></i> Notifications
                </h1>
                <p class="text-slate-500 font-medium mt-2">You have 2 unread notifications</p>
            </div>
            <i class="fa-solid fa-gear text-slate-400 text-xl cursor-pointer"></i>
        </div>

        <div class="space-y-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-start gap-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-xl"><i class="fa-regular fa-calendar text-xl"></i>
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-slate-900">Event Reminder</h3>
                        <span class="text-xs text-slate-400">2 hours ago</span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1">Champions League Final starts in 2 days.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="Footer"></div>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        load("navbar", "Components/navbar.html").then(() => {
            updateUserNavbar();
        });
        load("Footer", "Components/Footer.html");
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Discover Amazing Events</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Inter (Figma Global Typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Framework Vector Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] antialiased min-h-screen flex flex-col justify-between">

    <!-- 🌐 NAVBAR INTERFACE CONTAINER -->
    <div id="navbar"></div>

    <!-- ⚡ HERO MATRIX BLOCK CONTAINER -->
    <div id="hero-section"></div>

    <!-- 📦 FIGMA CENTRAL CANVAS WIREFRAME -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full space-y-16">
        
        <!-- 🗂️ BROWSE BY CATEGORY SECTION -->
        <section class="space-y-5">
            <h3 class="text-xs font-bold text-[#1E293B] tracking-wider uppercase text-left">Browse By Category</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-4">
                <!-- Music Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-music text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Music</span>
                </button>
                <!-- Sports Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-trophy text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Sports</span>
                </button>
                <!-- Parties Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-champagne-glasses text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Parties</span>
                </button>
                <!-- Art Shows Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-palette text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Art Shows</span>
                </button>
                <!-- Workshops Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-laptop-code text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Workshops</span>
                </button>
                <!-- Tech Talks Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-network-wired text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Tech Talks</span>
                </button>
                <!-- Comedy Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-face-laugh-beam text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Comedy</span>
                </button>
                <!-- Food Expo Card -->
                <button class="flex flex-col items-center justify-center p-5 bg-white border border-gray-100 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.01)] hover:shadow-md hover:border-[#5C7CFA] transition-all group cursor-pointer">
                    <div class="w-12 h-12 bg-[#EEF2FF] rounded-xl flex items-center justify-center text-[#5C7CFA] mb-2 group-hover:bg-[#5C7CFA] group-hover:text-white transition-all"><i class="fa-solid fa-utensils text-base"></i></div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-[#1E293B]">Food Expo</span>
                </button>
            </div>
        </section>

        <!-- 🎴 FEATURED LIVE EVENTS FEED GRID -->
        <section class="space-y-6">
            <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                <div class="space-y-0.5 text-left">
                    <h3 class="text-lg font-bold text-[#1E293B] tracking-tight">Featured Live Events</h3>
                    <p class="text-gray-400 text-xs font-medium">Handpicked stellar live experiences happening right now</p>
                </div>
                <button class="text-xs font-bold text-[#5C7CFA] hover:text-[#4C6EF5] transition-colors flex items-center space-x-1 cursor-pointer group">
                    <span>View All</span> <i class="fa-solid fa-arrow-right text-[10px] group-hover:translate-x-0.5 transition-transform"></i>
                </button>
            </div>
            
            <!-- CENTRAL CARD INJECTION CONSOLE GRID CONTAINER -->
            <div id="events-card-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Appended Javascript components map directly inside this segment -->
            </div>
        </section>

        <!-- 👥 POPULAR ORGANIZERS COMPONENT GRID -->
        <section class="space-y-5 bg-white p-6 rounded-2xl border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.01)]">
            <h3 class="text-xs font-bold text-gray-400 tracking-wider uppercase text-left">Popular Organizers</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <!-- Org 1 -->
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between items-center text-center space-y-4">
                    <div class="flex items-center space-x-4 w-full text-left">
                        <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=120" alt="" class="w-11 h-11 rounded-lg object-cover">
                        <div>
                            <h4 class="text-xs font-bold text-[#1E293B]">Creablers Productions</h4>
                            <p class="text-[10px] font-medium text-gray-400">48 Active Events</p>
                        </div>
                    </div>
                    <button class="w-full py-2 bg-slate-50 hover:bg-[#EEF2FF] hover:text-[#5C7CFA] text-gray-500 font-bold text-[11px] rounded-lg border border-gray-100 transition-all cursor-pointer">View Profile</button>
                </div>
                <!-- Org 2 -->
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between items-center text-center space-y-4">
                    <div class="flex items-center space-x-4 w-full text-left">
                        <img src="https://images.unsplash.com/photo-1486591978090-58e619d37fe7?w=120" alt="" class="w-11 h-11 rounded-lg object-cover">
                        <div>
                            <h4 class="text-xs font-bold text-[#1E293B]">Arts Council Pakistan</h4>
                            <p class="text-[10px] font-medium text-gray-400">112 Active Events</p>
                        </div>
                    </div>
                    <button class="w-full py-2 bg-slate-50 hover:bg-[#EEF2FF] hover:text-[#5C7CFA] text-gray-500 font-bold text-[11px] rounded-lg border border-gray-100 transition-all cursor-pointer">View Profile</button>
                </div>
                <!-- Org 3 -->
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between items-center text-center space-y-4">
                    <div class="flex items-center space-x-4 w-full text-left">
                        <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=120" alt="" class="w-11 h-11 rounded-lg object-cover">
                        <div>
                            <h4 class="text-xs font-bold text-[#1E293B]">Tech Alliance Asia</h4>
                            <p class="text-[10px] font-medium text-gray-400">29 Active Events</p>
                        </div>
                    </div>
                    <button class="w-full py-2 bg-slate-50 hover:bg-[#EEF2FF] hover:text-[#5C7CFA] text-gray-500 font-bold text-[11px] rounded-lg border border-gray-100 transition-all cursor-pointer">View Profile</button>
                </div>
            </div>
        </section>
    </main>




<div id="Footer"> </div>


    <script src="js/app.js"></script>

   <script>
    async function load(id, file) {
        try {
            const response = await fetch(file);
            if (!response.ok) throw new Error("File nahi mili");
            const data = await response.text();
            document.getElementById(id).innerHTML = data;
        } catch (error) {
            console.error("Hero Load Error:", error);
            // Agar ye error console mein aaye, toh file path check karein
        }
    }

       

    load("navbar", "Components/navbar.html");
        load("hero-section", "Components/hero-section.html");
        load("events-card-grid", "Components/events-card-grid.html");
        load("Footer", "Components/Footer.html");
</script>
</body>
</html>

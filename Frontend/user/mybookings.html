<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings | EventHub</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F8FAFC;
    }
  </style>
</head>

<body class="text-[#1E293B] antialiased min-h-screen flex flex-col justify-between">

<script>
const loggedUser = JSON.parse(localStorage.getItem("user"));

if (!loggedUser) {
  window.location.href = "login.html";
}
</script>

<div id="navbar"></div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow">

  <div class="mb-8 text-left">
    <h1 class="text-2xl font-bold text-[#0F172A] tracking-tight">My Bookings</h1>
    <p class="text-xs font-medium text-[#64748B] mt-1">View and manage your event bookings</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">

    <div class="bg-[#EFF2FE]/70 border border-[#4B4EFC]/10 rounded-2xl p-5 flex items-center justify-between">
      <div>
        <span class="text-[9px] font-bold text-[#4B4EFC] bg-[#EFF2FE] px-2.5 py-0.5 rounded-md uppercase">Bookings</span>
        <h3 id="totalBookings" class="text-2xl font-bold text-[#0F172A] mt-2">0</h3>
        <p class="text-[11px] text-[#64748B]">Total Bookings</p>
      </div>
      <div class="w-10 h-10 rounded-xl bg-white text-[#4B4EFC] flex items-center justify-center">
        <i class="fa-solid fa-ticket"></i>
      </div>
    </div>

    <div class="bg-[#EBF7F2]/70 border border-[#10B981]/10 rounded-2xl p-5 flex items-center justify-between">
      <div>
        <span class="text-[9px] font-bold text-[#10B981] bg-[#EBF7F2] px-2.5 py-0.5 rounded-md uppercase">Spent</span>
        <h3 id="totalSpent" class="text-2xl font-bold text-[#0F172A] mt-2">Rs. 0</h3>
        <p class="text-[11px] text-[#64748B]">Total Amount</p>
      </div>
      <div class="w-10 h-10 rounded-xl bg-white text-[#10B981] flex items-center justify-center">
        <i class="fa-solid fa-wallet"></i>
      </div>
    </div>

    <div class="bg-[#FFFBEB]/70 border border-[#F59E0B]/10 rounded-2xl p-5 flex items-center justify-between">
      <div>
        <span class="text-[9px] font-bold text-[#F59E0B] bg-[#FFFBEB] px-2.5 py-0.5 rounded-md uppercase">Tickets</span>
        <h3 id="totalTickets" class="text-2xl font-bold text-[#0F172A] mt-2">0</h3>
        <p class="text-[11px] text-[#64748B]">Total Tickets</p>
      </div>
      <div class="w-10 h-10 rounded-xl bg-white text-[#F59E0B] flex items-center justify-center">
        <i class="fa-solid fa-users"></i>
      </div>
    </div>

  </div>

  <div class="bg-white border border-[#E2E8F0] rounded-2xl p-6 shadow-sm">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-sm font-bold text-[#0F172A]">Booking History</h2>

      <button onclick="loadUserBookings()" class="text-xs bg-[#4B4EFC] text-white px-4 py-2 rounded-xl font-bold">
        Refresh
      </button>
    </div>

    <div id="bookingsContainer" class="space-y-4">
      <p class="text-sm text-slate-400">Loading bookings...</p>
    </div>
  </div>

</main>

<div id="Footer"></div>

<script src="js/app.js"></script>
<script src="../assets/js/user-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>
load("navbar", "Components/navbar.html").then(() => {
  updateUserNavbar();
});

load("Footer", "Components/Footer.html");

document.addEventListener("DOMContentLoaded", () => {
  loadUserBookings();
});

async function loadUserBookings() {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const container = document.getElementById("bookingsContainer");

  container.innerHTML = `<p class="text-sm text-slate-400">Loading bookings...</p>`;

  try {
    const response = await getUserBookings(user.id);

    if (!response.status) {
      container.innerHTML = `<p class="text-sm text-red-500">${response.message}</p>`;
      return;
    }

    const bookings = response.data || [];

    renderBookings(bookings);

  } catch (error) {
    console.log("Bookings Error:", error);
    container.innerHTML = `<p class="text-sm text-red-500">Failed to load bookings</p>`;
  }
}

function renderBookings(bookings) {
  const container = document.getElementById("bookingsContainer");

  let totalSpent = 0;
  let totalTickets = 0;

  bookings.forEach(booking => {
    totalSpent += Number(booking.total_amount || 0);
    totalTickets += Number(booking.tickets || 0);
  });

  document.getElementById("totalBookings").innerText = bookings.length;
  document.getElementById("totalSpent").innerText = "Rs. " + totalSpent;
  document.getElementById("totalTickets").innerText = totalTickets;

  if (bookings.length === 0) {
    container.innerHTML = `
      <div class="text-center py-16 text-slate-400 font-semibold">
        No bookings found
      </div>
    `;
    return;
  }

  container.innerHTML = "";

  bookings.forEach(booking => {
    const statusClass =
      booking.status === "confirmed"
        ? "bg-emerald-50 text-emerald-600 border-emerald-100"
        : "bg-red-50 text-red-600 border-red-100";

    container.innerHTML += `
      <div class="border border-gray-100 rounded-xl p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 bg-white hover:border-gray-200 transition-all">

        <div class="flex items-center space-x-4">
          <div class="w-16 h-16 rounded-xl bg-[#EFF2FE] text-[#4B4EFC] flex items-center justify-center shrink-0">
            <i class="fa-solid fa-ticket text-xl"></i>
          </div>

          <div>
            <h4 class="text-sm font-bold text-[#0F172A]">
              ${booking.event_title || "Event"}
            </h4>

            <p class="text-[11px] font-medium text-[#64748B] mt-1">
              <i class="fa-regular fa-calendar mr-1.5"></i>
              ${booking.event_date || ""} at ${booking.event_time || ""}
            </p>

            <p class="text-[11px] font-medium text-gray-400 mt-1">
              <i class="fa-solid fa-location-dot mr-1.5"></i>
              ${booking.location || "No location"}
            </p>

            <p class="text-[11px] font-medium text-gray-400 mt-1">
              Tickets:
              <span class="font-bold text-gray-600">${booking.tickets}</span>
              • Booking ID:
              <span class="font-mono text-[#4B4EFC] bg-blue-50 px-1.5 py-0.5 rounded font-bold">
                BK-${booking.id}
              </span>
            </p>
          </div>
        </div>

        <div class="flex sm:flex-col items-center sm:items-end justify-between w-full sm:w-auto shrink-0 border-t sm:border-0 pt-3 sm:pt-0">
          <span class="text-sm font-bold text-[#0F172A]">
            Rs. ${booking.total_amount}
          </span>

          <span class="mt-2 px-3 py-1 text-[10px] font-bold rounded-full border ${statusClass}">
            ${booking.status}
          </span>
        </div>

      </div>
    `;
  });
}
</script>

</body>
</html>

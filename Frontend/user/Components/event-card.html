<div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.02)] flex flex-col justify-between text-left group hover:shadow-[0_8px_30px_rgba(0,0,0,0.05)] transition-all duration-300 relative">
    
    <div class="relative w-full h-48 bg-slate-100 overflow-hidden">
        <img src="{{imageUrl}}" alt="{{title}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        <div class="absolute top-3 left-3 bg-[#EF4444] text-white text-[10px] font-extrabold tracking-wider px-2.5 py-1 rounded-md uppercase shadow-xs">Trending</div>
        <button class="absolute top-3 right-3 w-8 h-8 bg-white/80 hover:bg-white backdrop-blur-xs text-gray-700 rounded-full flex items-center justify-center transition-all shadow-xs cursor-pointer"><i class="fa-regular fa-heart text-xs"></i></button>
    </div>

    <div class="p-5 flex-grow space-y-3.5">
        <div class="flex items-center justify-between">
            <span class="bg-[#EEF2FF] text-[#5C7CFA] text-[10px] font-bold tracking-wider px-2.5 py-1 rounded-md uppercase">{{category}}</span>
            <span class="text-xs font-bold text-amber-500 flex items-center gap-1"><i class="fa-solid fa-star text-[10px]"></i> {{rating}}</span>
        </div>

        <h3 class="text-sm font-bold text-[#0F172A] leading-snug tracking-tight group-hover:text-[#5C7CFA] transition-colors min-h-[40px] line-clamp-2">{{title}}</h3>
        
        <div class="space-y-2 text-xs font-medium text-gray-400">
            <div class="flex items-center gap-2"><i class="fa-regular fa-calendar text-[11px] text-gray-400"></i> <span>{{date}}</span></div>
            <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-[11px] text-gray-400"></i> <span>{{location}}</span></div>
            <div class="flex items-center gap-2"><i class="fa-solid fa-user-group text-[10px] text-gray-400"></i> <span class="text-gray-500 font-semibold">{{seats}} seats available</span></div>
        </div>
    </div>

    <div class="px-5 pb-5 pt-3 border-t border-gray-50 flex items-center justify-between bg-white">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Price</span>
            <span class="text-sm font-extrabold text-[#0F172A]">{{price}}</span>
        </div>
        <button class="bg-[#5C7CFA] hover:bg-[#4C6EF5] text-white text-xs font-bold px-4 py-2.5 rounded-xl transition-all cursor-pointer shadow-xs active:scale-95">Book Now</button>
    </div>
</div>

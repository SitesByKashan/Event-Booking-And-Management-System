<div class="w-full bg-gradient-to-r from-[#4F46E5] via-[#6366F1] to-[#3B82F6] text-white py-24 px-6 text-center relative overflow-hidden bg-cover bg-center select-none"
     style="background-image: linear-gradient(rgba(79, 70, 229, 0.85), rgba(59, 130, 246, 0.85)), url('https://images.unsplash.com/photo-1506157786151-b8491531f063?w=1600');">

  <div class="absolute inset-0 opacity-20 bg-[radial-gradient(#ffffff_1.5px,transparent_1.5px)] [background-size:24px_24px] pointer-events-none"></div>

  <div class="max-w-4xl mx-auto space-y-5 relative z-10">
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-white tracking-tight leading-tight">
      Discover Amazing Events
    </h1>

    <p class="text-white/80 text-sm md:text-base max-w-xl mx-auto font-medium">
      Find and book tickets to concerts, sports, conferences, and more happening around you
    </p>

    <div class="bg-white p-1.5 rounded-full shadow-lg flex items-center max-w-2xl mx-auto transition-all focus-within:ring-4 focus-within:ring-white/20 mt-8">
      <div class="flex items-center w-full px-5 text-gray-700">
        <i class="fa-solid fa-magnifying-glass text-gray-400 mr-3 text-sm"></i>

        <input
          type="text"
          id="globalSearch"
          placeholder="Search for events, categories, or locations..."
          class="w-full outline-none text-xs md:text-sm font-medium placeholder-gray-400 bg-transparent text-[#1E293B]">
      </div>

      <button
        id="heroSearchBtn"
        type="button"
        class="bg-[#5C7CFA] hover:bg-[#4C6EF5] active:scale-98 text-white font-semibold text-xs md:text-sm px-6 py-2.5 rounded-full transition-all cursor-pointer whitespace-nowrap shadow-sm mr-1">
        Search
      </button>
    </div>

    <div class="flex items-center justify-center flex-wrap gap-2 text-[11px] font-semibold text-white/70 pt-4">
      <span>Popular:</span>

      <span onclick="searchCategory('Concerts')" class="px-3 py-1 bg-white/15 hover:bg-white/30 rounded-full cursor-pointer transition-colors">
        Concerts
      </span>

      <span onclick="searchCategory('Sports')" class="px-3 py-1 bg-white/15 hover:bg-white/30 rounded-full cursor-pointer transition-colors">
        Sports
      </span>

      <span onclick="searchCategory('Tech')" class="px-3 py-1 bg-white/15 hover:bg-white/30 rounded-full cursor-pointer transition-colors">
        Tech Events
      </span>

      <span onclick="searchCategory('Festival')" class="px-3 py-1 bg-white/15 hover:bg-white/30 rounded-full cursor-pointer transition-colors">
        Festivals
      </span>
    </div>
  </div>
</div>

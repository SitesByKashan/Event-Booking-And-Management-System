<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <title>EventHub - Event Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = { darkMode: 'class', }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body
  class="bg-[#f8fafc] text-slate-600 antialiased overflow-hidden dark:bg-[#0f1021] dark:text-slate-100 transition-colors duration-200">

<script>
const loggedUser = JSON.parse(localStorage.getItem("user"));

if (!loggedUser || loggedUser.role !== "admin") {
  window.location.href = "../user/login.html";
}
</script>

  <div class="flex h-screen w-screen overflow-hidden">
    <div id="sidebar" class="shrink-0 transition-all duration-300"></div>
    <div class="flex-1 flex flex-col h-full overflow-hidden min-w-0 transition-all duration-300">
      <div id="navbar"></div>

      <main class="flex-1 p-8 space-y-6 overflow-y-auto">
        <div class="flex justify-between items-center gap-4">
          <div>
            <h1 class="text-2xl font-bold text-[#1e293b] dark:text-white">Event Management</h1>
            <p class="text-sm text-slate-400 mt-0.5">Create and manage your events</p>
          </div>

          <button id="addEventBtn"
            class="bg-[#6366F1] hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl text-sm shadow-md transition-all duration-200 hover:scale-[1.03] active:scale-95 cursor-pointer whitespace-nowrap">
            + Add Event
          </button>
        </div>

        <div class="relative w-full">
          <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">🔍</span>

          <input id="eventSearch" type="text" placeholder="Search events..."
            class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/25 dark:bg-[#161730] dark:border-slate-800 dark:text-white" />
        </div>

        <div id="eventsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
          <div class="col-span-full text-center py-10">
            Loading events...
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Event Modal -->
  <div id="eventModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4">
    <div class="bg-white dark:bg-[#161730] w-full max-w-3xl rounded-2xl p-6 shadow-xl max-h-[90vh] overflow-y-auto">

      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 id="modalTitle" class="text-xl font-bold text-slate-800 dark:text-white">
            Add Event
          </h2>
          <p class="text-sm text-slate-400">Fill event details below</p>
        </div>

        <button onclick="closeModal()" class="text-3xl text-slate-400 hover:text-slate-700 dark:hover:text-white">
          ×
        </button>
      </div>

      <form id="eventForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input type="hidden" id="eventId">

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Event Title</label>
          <input id="title" type="text" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Location</label>
          <input id="location" type="text" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Event Date</label>
          <input id="eventDate" type="date" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Event Time</label>
          <input id="eventTime" type="time" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Price</label>
          <input id="price" type="number" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Total Tickets</label>
          <input id="tickets" type="number" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Category ID</label>
          <input id="categoryId" type="number" value="1" required
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Available Tickets</label>
          <input id="availableTickets" type="number"
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div class="md:col-span-2">
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Event Image</label>
          <input id="eventImage" type="file" accept="image/*"
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25">
        </div>

        <div class="md:col-span-2">
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Description</label>
          <textarea id="description" rows="4"
            class="mt-1 w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#0f1021] p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/25"></textarea>
        </div>

        <div class="md:col-span-2 flex justify-end gap-3 pt-4">
          <button type="button" onclick="closeModal()"
            class="px-5 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-semibold">
            Cancel
          </button>

          <button id="saveBtn" type="submit"
            class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold">
            Save Event
          </button>
        </div>

      </form>
    </div>
  </div>

  <script src="../assets/js/admin-api.js"></script>
  <script src="../assets/js/ai-chatbot.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script>
    load("sidebar", "Components/sidebar.html", "events");
    load("navbar", "Components/navbar.html");

    let allEvents = [];
    let editMode = false;

    document.addEventListener("DOMContentLoaded", function () {
      loadEvents();

      document.getElementById("addEventBtn").addEventListener("click", openAddModal);

      document.getElementById("eventForm").addEventListener("submit", saveEvent);

      document.getElementById("eventSearch").addEventListener("input", function () {
        const value = this.value.toLowerCase();

        const filteredEvents = allEvents.filter(event => {
          return (
            String(event.title || "").toLowerCase().includes(value) ||
            String(event.location || "").toLowerCase().includes(value) ||
            String(event.price || "").includes(value) ||
            String(event.event_date || "").includes(value)
          );
        });

        renderEvents(filteredEvents);
      });
    });

    async function loadEvents() {
      const grid = document.getElementById("eventsGrid");

      try {
        const response = await getEvents();


        if (!response.status) {
          grid.innerHTML = `
          <div class="col-span-full text-center py-10 text-red-500">
            ${response.message}
          </div>
        `;
          return;
        }

        allEvents = response.data;

        if (allEvents.length === 0) {
          grid.innerHTML = `
          <div class="col-span-full text-center py-10">
            No events found
          </div>
        `;
          return;
        }

        renderEvents(allEvents);

      } catch (error) {
        console.log("Events Error:", error);

        grid.innerHTML = `
        <div class="col-span-full text-center py-10 text-red-500">
          Failed to load events: ${error.message}
        </div>
      `;
      }
    }

    function renderEvents(events) {
      const grid = document.getElementById("eventsGrid");

      if (!events || events.length === 0) {
        grid.innerHTML = `
        <div class="col-span-full text-center py-10">
          No matching events found
        </div>
      `;
        return;
      }

      grid.innerHTML = "";

      events.forEach(event => {
        const soldTickets = Number(event.total_tickets || 0) - Number(event.available_tickets || 0);

        const imagePath = resolveEventImage(event.image);

        const statusClass = event.status === "active"
          ? "text-emerald-600 bg-emerald-50 border-emerald-100"
          : "text-slate-500 bg-slate-100 border-slate-200";

        grid.innerHTML += `
        <div class="event-card bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden dark:bg-[#161730] dark:border-slate-800 transition-all duration-200 hover:scale-[1.02] hover:shadow-lg">

          <img src="${imagePath}" class="h-48 w-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=900&q=80'">

          <div class="p-5 space-y-4">
            <div class="flex justify-between items-start gap-3">
              <h3 class="font-bold text-slate-800 dark:text-white">
                ${event.title}
              </h3>

              <span class="px-2 py-0.5 text-[10px] font-bold rounded-full uppercase border ${statusClass}">
                ${event.status}
              </span>
            </div>

            <div class="text-xs text-slate-500 space-y-2 dark:text-slate-400">
              <p>📝 ${event.description}</p>
              <p>📅 ${event.event_date}</p>
              <p>⏰ ${event.event_time}</p>
              <p>📍 ${event.location}</p>
              <p>🏷️ ${event.category_name ?? "No Category"}</p>
              <p>👥 ${soldTickets} / ${event.total_tickets} tickets sold</p>
              <p class="font-bold text-slate-800 dark:text-white pt-1">
                Rs. ${event.price}
  </p>
</div>

            <div class="grid grid-cols-2 gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
              <button onclick="openEditModal(${event.id})" class="py-2 border rounded-xl text-xs font-semibold transition-all duration-200 bg-white text-slate-700 border-slate-200 hover:bg-slate-50 dark:bg-[#0f1021] dark:text-slate-300 dark:border-slate-700 dark:hover:bg-slate-800">
                Edit
              </button>

              <button onclick="removeEvent(${event.id})" class="py-2 border rounded-xl text-xs font-semibold transition-all duration-200 bg-white text-rose-600 border-slate-200 hover:bg-rose-50 dark:bg-[#0f1021] dark:text-rose-400 dark:border-slate-700 dark:hover:bg-rose-900/20">
                Delete
              </button>
            </div>
          </div>
        </div>
      `;
      });
    }

    function resolveEventImage(image) {
      const value = String(image || "");

      if (!value) {
        return "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=900&q=80";
      }

      if (value.startsWith("http://") || value.startsWith("https://")) {
        return value;
      }

      return `http://localhost:8000/${value}`;
    }

    function openAddModal() {
      editMode = false;

      document.getElementById("modalTitle").innerText = "Add Event";
      document.getElementById("saveBtn").innerText = "Save Event";

      document.getElementById("eventForm").reset();
      document.getElementById("eventId").value = "";
      document.getElementById("categoryId").value = 1;
      document.getElementById("availableTickets").value = "";

      openModal();
    }

    function openEditModal(id) {
      const event = allEvents.find(e => Number(e.id) === Number(id));

      if (!event) {
        showToast("Event not found", "error");
        return;
      }

      editMode = true;

      document.getElementById("modalTitle").innerText = "Edit Event";
      document.getElementById("saveBtn").innerText = "Update Event";

      document.getElementById("eventId").value = event.id;
      document.getElementById("title").value = event.title || "";
      document.getElementById("description").value = event.description || "";
      document.getElementById("location").value = event.location || "";
      document.getElementById("eventDate").value = event.event_date || "";
      document.getElementById("eventTime").value = event.event_time || "";
      document.getElementById("price").value = event.price || "";
      document.getElementById("tickets").value = event.total_tickets || "";
      document.getElementById("availableTickets").value = event.available_tickets || "";
      document.getElementById("categoryId").value = event.category_id || 1;

      openModal();
    }

    function openModal() {
      const modal = document.getElementById("eventModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeModal() {
      const modal = document.getElementById("eventModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    async function saveEvent(e) {
      e.preventDefault();

      const totalTickets = document.getElementById("tickets").value;
      const availableTickets = document.getElementById("availableTickets").value || totalTickets;

      let imagePath = "";

      const imageInput = document.getElementById("eventImage");
      const imageFile = imageInput.files[0];

      if (imageFile) {
        const uploadResponse = await uploadEventImage(imageFile);

        console.log("Upload response:", uploadResponse);

        if (!uploadResponse.status) {
          showToast(uploadResponse.message, "error");
          return;
        }

        imagePath = uploadResponse.image;
      }

      const data = {
        category_id: document.getElementById("categoryId").value,
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        location: document.getElementById("location").value,
        event_date: document.getElementById("eventDate").value,
        event_time: document.getElementById("eventTime").value,
        price: document.getElementById("price").value,
        total_tickets: totalTickets,
        available_tickets: availableTickets,
        image: imagePath
      };

      if (editMode) {
        data.id = document.getElementById("eventId").value;

        const oldEvent = allEvents.find(e => Number(e.id) === Number(data.id));

        if (!imagePath && oldEvent) {
          data.image = oldEvent.image;
        }

        console.log("Final update data:", data);

        const response = await updateEvent(data);
        showToast(response.message);

        if (response.status) {
          closeModal();
          loadEvents();
        }

      } else {
        console.log("Final add data:", data);

        const response = await addEvent(data);
        showToast(response.message);

        if (response.status) {
          closeModal();
          loadEvents();
        }
      }
    }

    async function removeEvent(id) {
     const result = await Swal.fire({
  title: "Delete Event?",
  text: "Are you sure you want to delete this event?",
  icon: "warning",
  showCancelButton: true,
  confirmButtonColor: "#EF4444",
  cancelButtonColor: "#64748B",
  confirmButtonText: "Yes, Delete",
  cancelButtonText: "Cancel"
});

if (!result.isConfirmed) return;

      const response = await deleteEvent(id);

      showToast(response.message);

      if (response.status) {
        loadEvents();
      }
    }
  </script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>

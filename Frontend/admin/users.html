<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
        }
    </script>
</head>

<body class="bg-white dark:bg-[#0f1021] text-black dark:text-white transition-colors duration-300 font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <div id="sidebar" class="shrink-0 transition-all duration-300"></div>
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="navbar"></div>
            
            <main class="flex-1 p-8 overflow-y-auto bg-white dark:bg-[#0f1021] transition-colors duration-300">
                
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">User Management</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">Manage users and their account permissions here.</p>
                    </div>

                 <button class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all duration-300 ease-in-out bg-indigo-600 hover:bg-indigo-700 hover:scale-[1.02] active:scale-[0.98]">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
    </svg>
    Add User
</button>
                </div>
                
                <div class="relative mb-6">
                    <input type="text" placeholder="Search users..." 
                           class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/25 dark:bg-[#161730] dark:border-slate-800 dark:text-white">
                </div>
                
                <div id="users-table"></div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        load("sidebar", "Components/sidebar.html", "users");
        load("navbar", "Components/navbar.html");
        load("users-table", "Components/users-table.html");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <title>EventHub - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class', 
        }
    </script>
</head>

<body class="bg-white dark:bg-[#0f1021] text-black dark:text-white transition-colors duration-300 font-sans overflow-hidden">
    
<script>
const loggedUser = JSON.parse(localStorage.getItem("user"));

if (!loggedUser || loggedUser.role !== "admin") {
  window.location.href = "../user/login.html";
}
</script>

    <div class="flex h-screen">
        <div id="sidebar" class="shrink-0 transition-all duration-300"></div>
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="navbar"></div>
            
            <main class="flex-1 p-8 overflow-y-auto bg-white dark:bg-[#0f1021] transition-colors duration-300">
                
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">User Management</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">Manage users and their account permissions here.</p>
                    </div>
                </div>
                
                <div class="relative mb-6">
                    <input type="text" placeholder="Search users..." 
                           class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/25 dark:bg-[#161730] dark:border-slate-800 dark:text-white">
                </div>
                
                <div id="users-table"></div>
            </main>
        </div>
    </div>

   <script src="../assets/js/admin-api.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>
load("sidebar", "Components/sidebar.html", "users");
load("navbar", "Components/navbar.html");

load("users-table", "Components/users-table.html").then(() => {
  loadUsers();
});

async function loadUsers() {
  const tbody = document.getElementById("usersTableBody");

  try {
    const response = await getUsers();

    if (!response.status) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="p-5 text-center text-red-500">
            ${response.message}
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = "";

    response.data.forEach((user) => {
      const initials = user.name
        .split(" ")
        .map(word => word[0])
        .join("")
        .substring(0, 2)
        .toUpperCase();

      const statusClass = user.status === "active"
        ? "bg-emerald-500/10 text-emerald-600 dark:text-emerald-400"
        : "bg-rose-500/10 text-rose-600 dark:text-rose-400";

      tbody.innerHTML += `
        <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors group">
          <td class="p-5 flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-indigo-500/20 text-indigo-500 dark:text-indigo-400 flex items-center justify-center font-bold text-sm">
              ${initials}
            </div>
            <div>
              <p class="font-semibold text-slate-900 dark:text-white">${user.name}</p>
              <p class="text-xs text-slate-500 dark:text-slate-400">${user.email}</p>
            </div>
          </td>

          <td class="p-5">
            <span class="px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-xs text-slate-600 dark:text-slate-300">
              ${user.role}
            </span>
          </td>

          <td class="p-5 text-sm text-slate-600 dark:text-slate-400 font-medium">
            ${user.total_bookings} Bookings
          </td>

          <td class="p-5">
            <span class="px-3 py-1 rounded-full ${statusClass} text-xs font-medium">
              ${user.status}
            </span>
          </td>

          <td class="p-5 text-right">
            <button class="text-slate-400 hover:text-slate-900 dark:hover:text-white">
              ...
            </button>
          </td>
        </tr>
      `;
    });

  } catch (error) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="p-5 text-center text-red-500">
          Failed to load users
        </td>
      </tr>
    `;
  }
}
</script>
</body>
</html>

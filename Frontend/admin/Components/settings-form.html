<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <h2 class="text-lg font-bold mb-6 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
            <i class="fa-regular fa-user text-indigo-600 dark:text-indigo-400 text-sm"></i>
        </div>
        Profile Settings
    </h2>
    <div class="flex items-center gap-6 mb-8">
        <div class="w-20 h-20 rounded-full bg-slate-100 dark:bg-[#0f1021] border border-slate-200 dark:border-slate-700 flex items-center justify-center font-bold text-slate-400 text-xl">AD</div>
        <div>
            <button class="px-4 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-[#1e2040] transition font-medium">Change Photo</button>
            <p class="text-xs text-slate-400 mt-2">JPG, PNG. Max 2MB</p>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-6">
        <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Full Name</label><input type="text" value="Admin User" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
        <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Email</label><input type="email" value="admin@eventhub.com" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
        <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Phone</label><input type="text" value="+1 (555) 000-0000" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
        <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Role</label><input type="text" disabled value="Administrator" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-[#0f1021] text-slate-400 cursor-not-allowed"></div>
    </div>
    <button class="mt-8 px-6 py-2.5 w-40 bg-indigo-600 text-white rounded-xl transition-all duration-300 hover:bg-indigo-700 hover:scale-[1.02] hover:shadow-lg active:scale-[0.98] font-medium">Save Changes</button>
</section>

<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <h2 class="text-lg font-bold mb-6 flex items-center gap-3 text-slate-900 dark:text-white">
        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
            <i class="fa-regular fa-bell text-indigo-600 dark:text-indigo-400 text-sm"></i>
        </div>
        Notification Preferences
    </h2>
    <div class="space-y-6">

        <div class="flex justify-between items-center">
            <div>
                <p class="font-medium text-slate-900 dark:text-white">Email Notifications</p>
                <p class="text-sm text-slate-500 dark:text-slate-400">Receive email for new bookings</p>
            </div>
            <div id="email-toggle" onclick="toggleSwitch('email-toggle')" class="w-11 h-6 bg-indigo-600 rounded-full relative cursor-pointer transition-all duration-300">
                <div class="absolute top-1 right-1 w-4 h-4 bg-white rounded-full transition-all duration-300"></div>
            </div>
        </div>

        <div class="flex justify-between items-center">
            <div>
                <p class="font-medium text-slate-900 dark:text-white">Push Notifications</p>
                <p class="text-sm text-slate-500 dark:text-slate-400">Get push notifications for important updates</p>
            </div>
            <div id="push-toggle" onclick="toggleSwitch('push-toggle')" class="w-11 h-6 bg-indigo-600 rounded-full relative cursor-pointer transition-all duration-300">
                <div class="absolute top-1 right-1 w-4 h-4 bg-white rounded-full transition-all duration-300"></div>
            </div>
        </div>
    
        <div class="flex justify-between items-center">
            <div>
                <p class="font-medium text-slate-900 dark:text-white">Weekly Reports</p>
                <p class="text-sm text-slate-500 dark:text-slate-400">Receive weekly analytics reports</p>
            </div>
            <div id="weekly-toggle" onclick="toggleSwitch('weekly-toggle')" class="w-11 h-6 bg-slate-300 dark:bg-slate-700 rounded-full relative cursor-pointer transition-all duration-300">
                <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-all duration-300"></div>
            </div>
        </div>
    </div>
</section>

<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <h2 class="text-lg font-bold mb-6 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
            <i class="fa-solid fa-lock text-indigo-600 dark:text-indigo-400 text-sm"></i>
        </div>
        Security
    </h2>
    <div class="space-y-4">
        <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Current Password</label><input type="password" placeholder="••••••••" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
        <div class="grid grid-cols-2 gap-6">
            <div><label class="block text-sm text-slate-500 dark:text-white mb-2">New Password</label><input type="password" placeholder="••••••••" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
            <div><label class="block text-sm text-slate-500 dark:text-white mb-2">Confirm Password</label><input type="password" placeholder="••••••••" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none"></div>
        </div>
        <button class="mt-2 px-6 py-2.5 w-41 bg-indigo-600 text-white rounded-xl transition-all duration-300 hover:bg-indigo-700 hover:scale-[1.02] hover:shadow-lg active:scale-[0.98] font-medium">Update Password</button>
    </div>
</section>

<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <h2 class="text-lg font-bold mb-6 flex items-center gap-3 text-slate-900 dark:text-white">
        <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
            <i class="fa-solid fa-paintbrush text-indigo-600 dark:text-indigo-400 text-sm"></i>
        </div>
        Appearance
    </h2>
    <div class="flex justify-between items-center">
        <div>
            <p class="font-medium text-slate-900 dark:text-white">Dark Mode</p>
            <p class="text-sm text-slate-500 dark:text-slate-400">Toggle dark/light theme</p>
        </div>
        <div id="dark-mode-toggle" 
             onclick="toggleSwitch('dark-mode-toggle'); toggleTheme()" 
             class="w-11 h-6 bg-slate-300 dark:bg-slate-700 rounded-full relative cursor-pointer transition-all duration-300">
            <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow-sm"></div>
        </div>
    </div>
</section>

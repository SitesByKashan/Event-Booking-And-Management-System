<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
  <h2 class="text-lg font-bold mb-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
      <i class="fa-regular fa-user text-indigo-600 dark:text-indigo-400 text-sm"></i>
    </div>
    Profile Settings
  </h2>

  <div class="flex items-center gap-6 mb-8">
    <div id="profileInitials" class="w-20 h-20 rounded-full bg-slate-100 dark:bg-[#0f1021] border border-slate-200 dark:border-slate-700 flex items-center justify-center font-bold text-slate-400 text-xl">
      AD
    </div>
    <div>
      <button type="button" class="px-4 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-[#1e2040] transition font-medium">
        Change Photo
      </button>
      <p class="text-xs text-slate-400 mt-2">JPG, PNG. Max 2MB</p>
    </div>
  </div>

  <form id="profileForm">
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">Full Name</label>
        <input id="settingName" type="text" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">Email</label>
        <input id="settingEmail" type="email" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">Phone</label>
        <input id="settingPhone" type="text" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">Role</label>
        <input id="settingRole" type="text" disabled class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-[#0f1021] text-slate-400 cursor-not-allowed">
      </div>
    </div>

    <button type="submit" class="mt-8 px-6 py-2.5 w-40 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium">
      Save Changes
    </button>
  </form>
</section>

<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
  <h2 class="text-lg font-bold mb-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
      <i class="fa-solid fa-lock text-indigo-600 dark:text-indigo-400 text-sm"></i>
    </div>
    Security
  </h2>

  <form id="passwordForm" class="space-y-4">
    <div>
      <label class="block text-sm text-slate-500 dark:text-white mb-2">Current Password</label>
      <input id="currentPassword" type="password" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">New Password</label>
        <input id="newPassword" type="password" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block text-sm text-slate-500 dark:text-white mb-2">Confirm Password</label>
        <input id="confirmPassword" type="password" class="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
    </div>

    <button type="submit" class="mt-2 px-6 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium">
      Update Password
    </button>
  </form>
</section>

<section class="bg-white dark:bg-[#161730] p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
  <h2 class="text-lg font-bold mb-6 flex items-center gap-3 text-slate-900 dark:text-white">
    <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-[#2d3055] flex items-center justify-center">
      <i class="fa-solid fa-paintbrush text-indigo-600 dark:text-indigo-400 text-sm"></i>
    </div>
    Appearance
  </h2>

  <div class="flex justify-between items-center">
    <div>
      <p class="font-medium text-slate-900 dark:text-white">Dark Mode</p>
      <p class="text-sm text-slate-500 dark:text-slate-400">Toggle dark/light theme</p>
    </div>
    <div id="dark-mode-toggle" onclick="toggleSwitch('dark-mode-toggle'); toggleTheme()" class="w-11 h-6 bg-slate-300 dark:bg-slate-700 rounded-full relative cursor-pointer">
      <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
    </div>
  </div>
</section>

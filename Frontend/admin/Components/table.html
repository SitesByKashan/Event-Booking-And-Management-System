<div class="w-full mb-6 flex justify-between items-center">
  <div>
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">
      Booking Management
    </h1>
    <p class="text-slate-500 text-sm">
      Manage and track all event bookings
    </p>
  </div>
</div>

<div class="flex gap-4 mb-6">
  <svg class="w-5 h-5 mt-2.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
  <div class="relative flex-1">
     
    <input
      id="bookingSearch"
      type="text"
      placeholder="Search by booking ID, user, or event..."
      class="w-full pl-4 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/25 dark:bg-[#161730] dark:border-slate-800 dark:text-white"
    />
  </div>
</div>

<div class="w-full bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden dark:bg-[#161730] dark:border-slate-800">
  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="text-slate-500 text-sm border-b border-slate-100 dark:border-slate-800">
        <th class="px-6 py-5 font-semibold">Booking ID</th>
        <th class="px-6 py-5 font-semibold">User</th>
        <th class="px-6 py-5 font-semibold">Event</th>
        <th class="px-6 py-5 font-semibold">Date</th>
        <th class="px-6 py-5 font-semibold">Tickets</th>
        <th class="px-6 py-5 font-semibold">Amount</th>
        <th class="px-6 py-5 font-semibold">Status</th>
        <th class="px-6 py-5 font-semibold">Actions</th>
      </tr>
    </thead>

    <tbody
      id="bookingTableBody"
      class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-800"
    >
      <tr>
        <td colspan="8" class="px-6 py-8 text-center">
          Loading bookings...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Payments & Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = { 
        darkMode: 'class' 
    }
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#0f1021] text-slate-900 dark:text-white">
    <div class="flex w-full h-screen overflow-hidden">
                <div id="sidebar" class="transition-all duration-300 ease-in-out flex-shrink-0 h-full overflow-y-auto"></div>
        
        <div class="flex-1 flex flex-col min-w-0">
            <div id="navbar"></div>
            <main class="flex-1 p-8 overflow-y-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold">Payments & Transactions</h1>
                        <p class="text-slate-500">Monitor revenue and transaction history</p>
                    </div>
                    <button class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all duration-300 ease-in-out bg-indigo-600 hover:bg-indigo-700 hover:scale-[1.02] active:scale-[0.98]">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
    </svg>
    Export Report
</button>
                </div>

                <div id="stats-cards" class="flex flex-wrap gap-6 mb-4 w-full">
            </div>
            
                <div id="revenue-chart" class="bg-white dark:bg-[#161730] p-6 rounded-2xl border border-slate-200 dark:border-slate-800 mb-4"></div>

                <div id="transactions-table" class="bg-white dark:bg-[#161730] p-6 rounded-2xl border border-slate-200 dark:border-slate-800"></div>
            </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script>
        load("sidebar", "Components/sidebar.html","payments");
        load("navbar", "Components/navbar.html");
        load("stats-cards", "Components/stats-cards.html");
        load("revenue-chart", "Components/revenue-charts.html");
        load("transactions-table", "Components/transactions-table.html");
    </script>
</body>
</html>

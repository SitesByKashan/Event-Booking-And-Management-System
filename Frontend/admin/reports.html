<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Reports & Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { 
        darkMode: 'class'
     }
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#0f1021] text-slate-900 dark:text-white">
    <div class="flex w-full h-screen overflow-hidden">
        <div id="sidebar" class="transition-all duration-300 ease-in-out flex-shrink-0 w-64 h-full overflow-y-auto"></div>

        <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
            <div id="navbar"></div>
            
            <main class="flex-1 p-8">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold">Reports & Analytics</h1>
                        <p class="text-slate-500">Comprehensive business insights and metrics</p>
                    </div>
                   <div class="flex gap-3">
    <button class="px-4 py-2 bg-white dark:bg-[#1a1c35] border border-slate-200 dark:border-slate-800 rounded-lg text-sm font-medium text-slate-700 dark:text-white transition-all duration-300 hover:bg-slate-50 dark:hover:bg-[#252848] hover:border-slate-300">
        Export PDF
    </button>
    <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium transition-all duration-300 hover:bg-indigo-700 hover:scale-105 active:scale-95">
    Export CSV
</button>
</div>
                </div>

                <div id="stats-container" class="mb-8"></div>

                <div class="grid grid-cols-1 gap-6">
                    <div id="line-chart-container"></div>
                    <div id="bar-chart-container"></div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script>
        load("sidebar", "Components/sidebar.html", "reports");
        load("navbar", "Components/navbar.html");
        load("stats-container", "Components/reports-stats.html");
        load("line-chart-container", "Components/reports-line.html");
        load("bar-chart-container", "Components/reports-bar.html");
    </script>
</body>
</html>

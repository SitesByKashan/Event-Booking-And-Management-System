<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <title>EventHub - Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-slate-50 dark:bg-[#0f1021] text-slate-900 dark:text-white">

    <script>
const loggedUser = JSON.parse(localStorage.getItem("user"));

if (!loggedUser || loggedUser.role !== "admin") {
  window.location.href = "../user/login.html";
}
</script>

    <div class="flex w-full h-screen overflow-hidden">

        <div id="sidebar" class="shrink-0 transition-all duration-300"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <div id="navbar"></div>

            <!-- Main Content Area -->
            <main class="flex-1 p-8 overflow-y-auto">
                <!-- Header Section -->
                <div class="flex justify-between items-center mb-6"> <!-- mb-8 se hata kar mb-6 kiya -->
                    <div>
                        <h1 class="text-2xl font-bold">Notifications Center</h1>
                        <p class="text-slate-500">Stay updated with all activities</p>
                    </div>
                    <div class="flex gap-3">

                        <button onclick="markAllNotificationsRead()"
                            class="mark-read-btn flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#1e2040]/50 border border-slate-200 dark:border-[#2d3055] rounded-xl text-sm font-medium text-slate-700 dark:text-white transition-all duration-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-200 dark:hover:border-indigo-800 hover:text-indigo-600 dark:hover:text-indigo-300">

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <path d="M4 12.6l3.7 3.7L14.7 9" />
                                <path d="M10 12.6l3.7 3.7L20.7 9" />
                            </svg>

                            Mark All Read
                        </button>

                        <button onclick="clearAllNotifications()"
                            class="mark-read-btn flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#1e2040]/50 border border-slate-200 dark:border-[#2d3055] rounded-xl text-sm font-medium text-slate-700 dark:text-white transition-all duration-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-200 dark:hover:border-indigo-800 hover:text-indigo-600 dark:hover:text-indigo-300">

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                            </svg>

                            Clear All
                        </button>

                    </div>
                </div>

                <!-- Stats and List Area -->
                <div class="flex flex-col gap-1">
                    <div id="notif-stats" class="w-full"></div>
                    <div id="notif-list"
                        class="bg-white dark:bg-[#161730] p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../assets/js/admin-api.js"></script>
    <script src="../assets/js/ai-chatbot.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        load("sidebar", "Components/sidebar.html", "notifications");
        load("navbar", "Components/navbar.html");

        load("notif-stats", "Components/notification-stats.html").then(() => {
            loadNotificationStats();
        });

        load("notif-list", "Components/notification-list.html").then(() => {
            loadNotifications();
        });

        async function loadNotificationStats() {
            const notifRes = await getAdminNotifications();

            const notifications = notifRes.status ? notifRes.data : [];

            const highPriority = notifications.filter(n => ["refund", "quote", "accepted"].includes(n.type)).length;

            document.getElementById("notifBookings").innerText = notifications.filter(n => n.type === "booking").length;
            document.getElementById("notifUsers").innerText = notifications.filter(n => n.type === "account" || n.type === "vendor").length;
            document.getElementById("notifHighPriority").innerText = highPriority;
            document.getElementById("notifTotal").innerText = notifications.length;
        }

        async function loadNotifications() {
            const container = document.getElementById("notificationList");

            const notifRes = await getAdminNotifications();
            const notifications = notifRes.status ? notifRes.data : [];

            if (notifications.length === 0) {
                container.innerHTML = `
      <div class="p-5 text-center text-slate-400">
        No notifications found
      </div>
    `;
                return;
            }

            container.innerHTML = "";

            notifications.forEach((notif) => {
                const icon = iconForType(notif.type);
                container.innerHTML += `
      <div class="notification-row flex items-center p-5 border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-[#1f2140] transition-all duration-300">
        <div class="flex-shrink-0 w-10 h-10 rounded-xl ${icon.bg} ${icon.color} flex items-center justify-center mr-4">
          <i class="${icon.icon} text-lg"></i>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-0.5">
            <h5 class="font-semibold text-slate-900 dark:text-white truncate">
              ${notif.title}
            </h5>
            <span class="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded">
              ${notif.type || "info"}
            </span>
          </div>

          <p class="text-sm text-slate-500 dark:text-slate-400 truncate">
            ${notif.message}
          </p>
        </div>

        <div class="flex items-center gap-4 ml-4">
          <span class="text-xs text-slate-400">
            ${notif.user_name || "User"} • ${notif.created_at}
          </span>

          <div class="flex items-center gap-1">

  <button
    onclick="markAsRead(this)"
    class="p-2 text-slate-400 hover:text-emerald-500 transition-colors">
    <i class="fas fa-check"></i>
  </button>

  <button
    onclick="deleteNotification(this)"
    class="p-2 text-slate-400 hover:text-red-500 transition-colors">
    <i class="fas fa-trash"></i>
  </button>

</div>
        </div>
      </div>
    `;
            });
        }

        function iconForType(type) {
            const map = {
                booking: { icon: "fas fa-ticket", bg: "bg-indigo-50", color: "text-indigo-500" },
                refund: { icon: "fas fa-rotate-left", bg: "bg-amber-50", color: "text-amber-600" },
                quote: { icon: "fas fa-file-invoice-dollar", bg: "bg-violet-50", color: "text-violet-600" },
                accepted: { icon: "fas fa-circle-check", bg: "bg-emerald-50", color: "text-emerald-600" },
                message: { icon: "fas fa-message", bg: "bg-sky-50", color: "text-sky-600" },
                account: { icon: "fas fa-user-check", bg: "bg-purple-50", color: "text-purple-600" },
                vendor: { icon: "fas fa-store", bg: "bg-rose-50", color: "text-rose-600" }
            };

            return map[type] || { icon: "fas fa-bell", bg: "bg-slate-100", color: "text-slate-500" };
        }

        function markAsRead(button) {

            const row = button.closest(".flex.items-center.p-5");

            row.classList.add(
                "opacity-60"
            );

            button.innerHTML =
                '<i class="fas fa-check-double text-emerald-500"></i>';

            button.disabled = true;
        }

        function deleteNotification(button) {

            const row = button.closest(".flex.items-center.p-5");

            row.style.transition = "0.3s";

            row.style.opacity = "0";

            setTimeout(() => {
                row.remove();
            }, 300);
        }
        function markAllNotificationsRead() {

  document.querySelectorAll(".notification-row").forEach((row) => {
    row.classList.add("opacity-60");

    const checkBtn = row.querySelector(".mark-read-btn");

    if (checkBtn) {
      checkBtn.innerHTML =
        '<i class="fas fa-check-double text-emerald-500"></i>';
      checkBtn.disabled = true;
    }
  });

  showToast("All notifications marked as read");
}

function clearAllNotifications() {

  const container = document.getElementById("notificationList");

  if (!container) return;

  container.innerHTML = `
    <div class="p-10 text-center text-slate-400">
      No notifications available
    </div>
  `;
}
    </script>
</body>

</html>

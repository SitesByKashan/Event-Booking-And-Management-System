<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class' 
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-[#0f1021] text-slate-900 dark:text-white">
    <div class="flex w-full h-screen overflow-hidden">
        
        <div id="sidebar" class="shrink-0 transition-all duration-300"></div>
        
        <div class="flex-1 flex flex-col min-w-0">
            <div id="navbar"></div>
            
            <!-- Main Content Area -->
            <main class="flex-1 p-8 overflow-y-auto">
                <!-- Header Section -->
                <div class="flex justify-between items-center mb-6"> <!-- mb-8 se hata kar mb-6 kiya -->
                    <div>
                        <h1 class="text-2xl font-bold">Notifications Center</h1>
                        <p class="text-slate-500">Stay updated with all activities</p>
                    </div>
                    <div class="flex gap-3">
                        <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#1e2040]/50 border border-slate-200 dark:border-[#2d3055] rounded-xl text-sm font-medium text-slate-700 dark:text-white transition-all duration-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-200 dark:hover:border-indigo-800 hover:text-indigo-600 dark:hover:text-indigo-300">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 12.6l3.7 3.7L14.7 9" />
                                <path d="M10 12.6l3.7 3.7L20.7 9" />
                            </svg>
                            Mark All Read
                        </button>
                        <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#1e2040]/50 border border-slate-200 dark:border-[#2d3055] rounded-xl text-sm font-medium text-slate-700 dark:text-white transition-all duration-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-200 dark:hover:border-indigo-800 hover:text-indigo-600 dark:hover:text-indigo-300">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            Clear All
                        </button>
                    </div>
                </div>

                <!-- Stats and List Area -->
                <div class="flex flex-col gap-1">
                    <div id="notif-stats" class="w-full"></div>
                    <div id="notif-list" class="bg-white dark:bg-[#161730] p-6 rounded-2xl border border-slate-200 dark:border-slate-800"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        load("sidebar", "Components/sidebar.html", "notifications");
        load("navbar", "Components/navbar.html");
        load("notif-stats", "Components/notification-stats.html");
        load("notif-list", "Components/notification-list.html");
    </script>
</body>
</html>

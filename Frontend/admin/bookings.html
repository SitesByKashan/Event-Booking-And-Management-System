<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Booking Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#f8fafc] text-slate-600 antialiased overflow-hidden dark:bg-slate-900 dark:text-slate-100">

<div class="flex h-screen w-screen overflow-hidden">
  <div id="sidebar" class="shrink-0 transition-all duration-300"></div>
  <div class="flex-1 flex flex-col h-full overflow-hidden min-w-0 transition-all duration-300">
    <div id="navbar"></div>
    <main class="flex-1 p-8 overflow-y-auto bg-[#f8fafc] dark:bg-slate-900 transition-all duration-300">
      <div id="table" class="w-full"></div>
    </main>
  </div>
</div>

<script src="../assets/js/admin-api.js"></script>
<script src="js/app.js"></script>


<script>
  load("sidebar", "Components/sidebar.html", "bookings");
  load("navbar", "Components/navbar.html");
  load("table", "Components/table.html");
</script>


<script>
window.onload = async function () {
  await load("sidebar", "Components/sidebar.html", "bookings");
  await load("navbar", "Components/navbar.html");
  await load("table", "Components/table.html");

  const tbody = document.getElementById("bookingTableBody");

  if (!tbody) {
    alert("bookingTableBody nahi mila");
    return;
  }

  const response = await getBookings();

  if (!response.status) {
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="px-6 py-8 text-center text-red-500">
          ${response.message}
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = "";

  response.data.forEach((booking) => {
    tbody.innerHTML += `
      <tr>
        <td class="px-6 py-5">#BK-${booking.id}</td>
        <td class="px-6 py-5">${booking.user_name}<br><span class="text-xs text-slate-400">${booking.user_email}</span></td>
        <td class="px-6 py-5">${booking.event_title}</td>
        <td class="px-6 py-5">${booking.created_at}</td>
        <td class="px-6 py-5">${booking.tickets}</td>
        <td class="px-6 py-5">Rs. ${booking.total_amount}</td>
        <td class="px-6 py-5">${booking.status}</td>
        <td class="px-6 py-5">👁️</td>
      </tr>
    `;
  });
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { 
        darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#0f1021] text-slate-900 dark:text-white h-screen">
    
    <div class="flex w-full h-screen overflow-hidden">
        <div id="sidebar" class="transition-all duration-300 ease-in-out flex-shrink-0 h-full overflow-y-auto"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <div id="navbar"></div>
            
            <main class="flex-1 p-8 overflow-y-auto">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold">Calendar & Scheduling</h1>
                    <p class="text-slate-500">View and manage event schedules</p>
                </div>

                <div id="calendar-view">
                    </div>
                 <div id="stats-view">
                    </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        load("sidebar", "Components/sidebar.html", "calendar");
        load("navbar", "Components/navbar.html");
        load("calendar-view", "Components/calendar-component.html");
        load("stats-view", "Components/calendar-stats.html");
    </script>
</body>
</html>
